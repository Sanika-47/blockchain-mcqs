        { text: "Phishing attacks aim to ………", options: ["send spam.", "trick users into revealing sensitive information.", "encrypt files.", "scan networks."], correct: "B" },
        { text: "Metadata in digital evidence includes ………", options: ["Data about data (creation time, author, last modified).", "File content only.", "File size only.", "IP addresses only."], correct: "A" },
        { text: "Which of the following is a type of hacker?", options: ["White hat", "Black hat", "Grey hat", "All of the above"], correct: "D" },
        { text: "Proper documentation of digital evidence during investigation is called ______.", options: ["Data formatting", "Chain of custody", "Data deletion", "System recovery"], correct: "B" },
        { text: "Evidence handling in digital forensics mainly ensures ______.", options: ["faster internet speed", "proper preservation and security of digital evidence", "installation of software", "deletion of unwanted files"], correct: "B" },
        { text: "The process of examining digital evidence to find useful information is called ______.", options: ["Analysis", "Deletion", "Transmission", "Encoding"], correct: "A" },
        { text: "The final stage of a digital forensic investigation is ______.", options: ["Reporting and presentation", "Data deletion", "Hardware installation", "System reboot"], correct: "A" },
        { text: "Digital forensic investigators mainly work to ______.", options: ["design computer games", "solve cybercrime cases", "build computer hardware", "create websites"], correct: "B" },
        { text: "During evidence handling, investigators must ______.", options: ["modify original data", "delete unwanted files", "carefully preserve and document evidence", "install new software"], correct: "C" },
        { text: "The process of securing and preserving digital evidence is called ______.", options: ["Evidence preservation", "Data deletion", "Data formatting", "System upgrade"], correct: "A" },
        { text: "A forensic image is ______.", options: ["a screenshot of data", "an exact bit-by-bit copy of a storage device", "a printed document", "a compressed file"], correct: "B" },
        { text: "Which stage involves interpreting the meaning of the collected digital evidence?", options: ["Collection", "Analysis", "Identification", "Preservation"], correct: "B" },
        { text: "In digital forensics, investigators should analyze ______.", options: ["only the original evidence", "the forensic copy of evidence", "random files", "deleted hardware"], correct: "B" },
        { text: "Which of the following is an important rule in digital forensics?", options: ["Destroy evidence after analysis", "Modify original data", "Preserve and protect digital evidence", "Share evidence publicly"], correct: "C" },
        { text: "The main goal of ethical hacking is to ______.", options: ["destroy systems", "increase cybercrime", "find vulnerabilities and improve security", "create malware"], correct: "C" }
    ];

    // ensure total = 135
    const QUESTIONS = questionsData;
    const TOTAL = QUESTIONS.length;
    document.getElementById('totalQs').innerText = TOTAL;

    let userAnswers = new Array(TOTAL).fill(null);
    let currentQ = 0;

    // load from localStorage
    function loadProgress() {
        const saved = localStorage.getItem('mcq_blockchain_135');
        if (saved) {
            try {
                const arr = JSON.parse(saved);
                if (arr.length === TOTAL) userAnswers = arr;
            } catch(e) {}
        }
        updateStatsAndUI();
    }

    function persist() {
        localStorage.setItem('mcq_blockchain_135', JSON.stringify(userAnswers));
    }

    function updateStatsAndUI() {
        const answered = userAnswers.filter(a => a !== null).length;
        const correctCount = userAnswers.reduce((acc, ans, idx) => {
            if (ans && ans === QUESTIONS[idx].correct) return acc + 1;
            return acc;
        }, 0);
        const percent = TOTAL ? ((correctCount / TOTAL) * 100).toFixed(1) : 0;
        document.getElementById('answeredCount').innerText = answered;
        document.getElementById('liveScore').innerText = percent;
        renderCurrentQuestion();
        renderNavGrid();
        document.getElementById('currentIdxDisplay').innerText = currentQ + 1;
    }

    function renderCurrentQuestion() {
        const q = QUESTIONS[currentQ];
        document.getElementById('questionText').innerHTML = `${currentQ+1}. ${q.text}`;
        const optsDiv = document.getElementById('optionsContainer');
        optsDiv.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isSelected = (userAnswers[currentQ] === letter);
            const div = document.createElement('div');
            div.className = `opt-item ${isSelected ? 'selected' : ''}`;
            div.innerHTML = `
                <input type="radio" name="mcq" value="${letter}" id="opt_${currentQ}_${letter}" class="opt-radio" ${isSelected ? 'checked' : ''}>
                <label for="opt_${currentQ}_${letter}" class="opt-label">${letter}. ${opt}</label>
            `;
            const radio = div.querySelector('input');
            radio.addEventListener('change', (e) => {
                if (e.target.checked) {
                    userAnswers[currentQ] = letter;
                    persist();
                    updateStatsAndUI();
                }
            });
            optsDiv.appendChild(div);
        });
    }

    function renderNavGrid() {
        const grid = document.getElementById('questionNavGrid');
        grid.innerHTML = '';
        for (let i = 0; i < TOTAL; i++) {
            const badge = document.createElement('div');
            badge.className = 'q-badge';
            if (userAnswers[i] !== null) badge.classList.add('answered');
            if (i === currentQ) badge.classList.add('current');
            badge.innerText = i+1;
            badge.addEventListener('click', () => {
                currentQ = i;
                updateStatsAndUI();
            });
            grid.appendChild(badge);
        }
    }

    function showWrongAnswers() {
        const wrongList = [];
        for (let i = 0; i < TOTAL; i++) {
            const ans = userAnswers[i];
            if (ans && ans !== QUESTIONS[i].correct) {
                const correctLetter = QUESTIONS[i].correct;
                const correctText = QUESTIONS[i].options[correctLetter.charCodeAt(0)-65];
                wrongList.push({
                    num: i+1,
                    question: QUESTIONS[i].text,
                    yourAns: ans,
                    correctAns: correctLetter + ". " + correctText
                });
            }
        }
        const panel = document.getElementById('wrongPanel');
        if (wrongList.length === 0) {
            panel.innerHTML = `<div class="wrong-answers-panel"><strong>No wrong answers!</strong> 🎯 Perfect score.</div>`;
            panel.style.display = 'block';
            panel.scrollIntoView({ behavior: 'smooth' });
            return;
        }
        let html = `<div class="wrong-answers-panel"><strong>📋 Incorrect answers (${wrongList.length} questions)</strong><div class="wrong-list">`;
        wrongList.forEach(w => {
            html += `<div class="wrong-item"><b>Q${w.num}:</b> ${w.question}<br>✖ Your answer: ${w.yourAns}<br>✔ Correct: ${w.correctAns}</div>`;
        });
        html += `</div></div>`;
        panel.innerHTML = html;
        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth' });
    }

    function resetAll() {
        if (confirm('Reset all answers? All progress will be lost.')) {
            userAnswers.fill(null);
            persist();
            currentQ = 0;
            updateStatsAndUI();
            document.getElementById('wrongPanel').style.display = 'none';
        }
    }

    // Event listeners
    document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentQ > 0) { currentQ--; updateStatsAndUI(); }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
        if (currentQ < TOTAL-1) { currentQ++; updateStatsAndUI(); }
    });
    document.getElementById('submitBtn').addEventListener('click', showWrongAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    loadProgress();
</script>
</body>
</html>
